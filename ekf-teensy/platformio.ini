; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
lib_deps =
    adafruit/Adafruit BNO055@^1.6.0
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/Adafruit BMP280 Library
    sparkfun/SparkFun u-blox GNSS Arduino Library@^2.2.26
    SPI
    Wire

lib_extra_dirs =
    ../shared/
    ../ekf/

build_flags =
    -I${PROJECT_DIR}/../eigen
    -I${PROJECT_DIR}/../shared
    -DEIGEN_NO_MALLOC
    -DEIGEN_NO_DEBUG
    -DEIGEN_DONT_VECTORIZE
    -DEIGEN_DISABLE_UNALIGNED_ARRAY_ASSERT
    -DEIGEN_MAX_ALIGN_BYTES=0
    ; Exceptions stay disabled on Teensy: enabling -fexceptions makes the
    ; linker emit ARM unwind tables (.ARM.exidx) that reference symbols in
    ; .flashmem at 0x60000000, which is > 1 GB from .text and overflows the
    ; PREL31 relocation. Tier 2 misconfig errors go through
    ; shared/core/misuse.hpp, which throws on host and aborts here.

monitor_speed = 115200

[env:native]
platform = native
lib_extra_dirs =
    ../shared/
    ../ekf/

build_flags =
    -I${PROJECT_DIR}/../eigen
    -I${PROJECT_DIR}/../shared
    -std=c++17
    -DEIGEN_NO_MALLOC
    -DEIGEN_NO_DEBUG
    -DEIGEN_DONT_VECTORIZE
    -DEIGEN_DISABLE_UNALIGNED_ARRAY_ASSERT
    -DEIGEN_MAX_ALIGN_BYTES=0
    -fexceptions
