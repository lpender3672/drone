name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build-ekf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libgtest-dev libeigen3-dev

      - name: Configure
        run: cmake -B ekf/build -S ekf -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build tests
        run: cmake --build ekf/build --target ekf_tests

      - name: Test
        working-directory: ekf/build
        run: ctest --output-on-failure

  build-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libeigen3-dev

      - name: Configure
        run: cmake -B sim/build -S sim -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build sim/build

  build-teensy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Eigen
        run: |
          sudo apt-get install -y libeigen3-dev
          cp -r /usr/include/eigen3 $GITHUB_WORKSPACE/eigen

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build Teensy firmware
        working-directory: ekf-teensy
        run: pio run -e teensy41

      - name: Test native
        working-directory: ekf-teensy
        run: pio test -e native
